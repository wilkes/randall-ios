# SwiftLint Configuration
disabled_rules:
  - trailing_whitespace
  - line_length

opt_in_rules:
  - empty_count
  - force_unwrapping
  - implicitly_unwrapped_optional
  - overridden_super_call
  - redundant_nil_coalescing

analyzer_rules:
  - unused_import

included:
  - .
  - Models
  - Views
  - Services

excluded:
  - Randall iOS.xcodeproj
  - .build
  - DerivedData

# Rule Configurations

file_length:
  warning: 500
  error: 1000

function_body_length:
  warning: 50
  error: 100

type_body_length:
  warning: 300
  error: 500

identifier_name:
  min_length: 1
  max_length: 50