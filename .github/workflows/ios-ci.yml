name: iOS CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Test
    runs-on: macos-14
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Select Xcode Version
      run: sudo xcode-select -switch /Applications/Xcode_15.2.app/Contents/Developer
      
    - name: Show Xcode Version
      run: xcodebuild -version
      
    - name: Show Available Simulators
      run: xcrun simctl list devices available
      
    - name: Cache derived data
      uses: actions/cache@v4
      with:
        path: ~/Library/Developer/Xcode/DerivedData
        key: ${{ runner.os }}-derived-data-${{ hashFiles('**/*.xcodeproj') }}
        restore-keys: |
          ${{ runner.os }}-derived-data-
    
    - name: Build for Testing
      run: |
        xcodebuild \
          -project "Randall iOS.xcodeproj" \
          -scheme "Randall iOS" \
          -destination "platform=iOS Simulator,name=iPhone 15,OS=17.2" \
          -derivedDataPath ~/Library/Developer/Xcode/DerivedData \
          build-for-testing
    
    - name: Run Unit Tests
      run: |
        xcodebuild \
          -project "Randall iOS.xcodeproj" \
          -scheme "Randall iOS" \
          -destination "platform=iOS Simulator,name=iPhone 15,OS=17.2" \
          -derivedDataPath ~/Library/Developer/Xcode/DerivedData \
          -enableCodeCoverage YES \
          test-without-building
    
    - name: Generate Code Coverage Report
      run: |
        xcrun xccov view --report --json ~/Library/Developer/Xcode/DerivedData/*/Logs/Test/*.xcresult > coverage.json
        
    - name: Upload Coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        files: ./coverage.json
        fail_ci_if_error: false
        verbose: true
        
  build-release:
    name: Build Release
    runs-on: macos-14
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Select Xcode Version
      run: sudo xcode-select -switch /Applications/Xcode_15.2.app/Contents/Developer
      
    - name: Cache derived data
      uses: actions/cache@v4
      with:
        path: ~/Library/Developer/Xcode/DerivedData
        key: ${{ runner.os }}-derived-data-release-${{ hashFiles('**/*.xcodeproj') }}
        restore-keys: |
          ${{ runner.os }}-derived-data-release-
          ${{ runner.os }}-derived-data-
    
    - name: Build Release
      run: |
        xcodebuild \
          -project "Randall iOS.xcodeproj" \
          -scheme "Randall iOS" \
          -destination "generic/platform=iOS" \
          -configuration Release \
          -derivedDataPath ~/Library/Developer/Xcode/DerivedData \
          build
          
    - name: Archive App
      run: |
        xcodebuild \
          -project "Randall iOS.xcodeproj" \
          -scheme "Randall iOS" \
          -destination "generic/platform=iOS" \
          -configuration Release \
          -derivedDataPath ~/Library/Developer/Xcode/DerivedData \
          archive \
          -archivePath ~/Library/Developer/Xcode/DerivedData/RandallApp.xcarchive